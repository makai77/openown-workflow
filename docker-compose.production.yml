# Production stack for the Apache-fronted VPS.
#
# The host already runs Apache (ports 80/443) for another site, so Traefik can
# NOT own those ports here. Instead Apache is the public front door and reverse-
# proxies to this stack: Gunicorn is published on 127.0.0.1:8000 (localhost only,
# never public), and Postgres/Redis stay on the internal Docker network.
# TLS, the http->https redirect, and serving the built React SPA are all handled
# by the host Apache vhost (see DEPLOYMENT.md), not by this compose file.
volumes:
  production_postgres_data: {}
  production_postgres_data_backups: {}
  production_django_media: {}

services:
  django:
    build:
      context: .
      dockerfile: ./compose/production/django/Dockerfile
    image: openown_production_django
    volumes:
      - production_django_media:/app/openown/media
    depends_on:
      - postgres
      - redis
    env_file:
      - ./.envs/.production/.django
      - ./.envs/.production/.postgres
    # Localhost-only publish: only the host Apache can reach Gunicorn (:5000 in
    # the container). Nothing on :8000 is exposed to the public interface.
    ports:
      - '127.0.0.1:8000:5000'
    command: /start
    restart: unless-stopped

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: openown_production_postgres
    volumes:
      - production_postgres_data:/var/lib/postgresql/18/docker
      - production_postgres_data_backups:/backups
    env_file:
      - ./.envs/.production/.postgres
    restart: unless-stopped

  redis:
    image: docker.io/redis:8.8
    restart: unless-stopped
